name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make mvnw executable
        run: chmod +x ${{ github.workspace }}/mvnw

      - name: Clean target
        run: ${{ github.workspace }}/mvnw clean

      - name: Build with Maven
        run: ${{ github.workspace }}/mvnw -DskipTests package

      - name: Copy Dockerfile to target
        working-directory: .
        run: cp Dockerfile target/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: grujud22
          password: ${{ secrets.CR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./target
          push: true
          tags: ghcr.io/grujud22/weather_project_energy_consumption:latest